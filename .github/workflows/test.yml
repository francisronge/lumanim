name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: python -m unittest discover -s tests -v
      - run: node --check skills/lumanim/assets/lumanim-live.js
      - run: node --check skills/lumanim/assets/teach-choice.js

  example:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: python skills/lumanim/scripts/package_lesson.py examples/paradoxes
      - run: git diff --exit-code -- examples/paradoxes/index.html examples/paradoxes/index.source.html examples/paradoxes/lessons
      - run: python skills/lumanim/scripts/verify_lesson.py examples/paradoxes
